<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLIM API — Infrastructure for Verifiable Evidence.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}

  :root{
    --void:        #07070F;
    --night:       #0D0B1E;
    --deep-purple: #1A0A3A;
    --violet:      #7C3AED;
    --violet-dim:  #4C1D95;
    --cyan:        #06B6D4;
    --cyan-dim:    #164E63;
    --starlight:   #EDE9FE;
    --body-text:   #C4B5FD;
    --muted:       #7C6FA0;
    --ccb-pink:    #F9A8D4;
    --ccb-dim:     #831843;
    --seal-gold:   #F59E0B;
    --risk-red:    #F87171;
    --font-display:'Playfair Display', Georgia, serif;
    --font-body:   'Inter', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', 'Courier New', monospace;
  }

  body{
    background: var(--void);
    color: var(--starlight);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ─── PROGRESS BAR ─────────────────────────────────────────── */
  .progress-wrap{
    padding: 1.75rem 2rem 1.25rem;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .progress-track{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.4rem;
    margin-bottom: 0.85rem;
  }

  .progress-seg{
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.09);
    overflow: hidden;
    position: relative;
  }

  .progress-seg .fill{
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--violet), var(--cyan));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }

  .progress-labels{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-labels span{ transition: color 0.4s ease; }
  .progress-labels span.current{ color: var(--cyan); }
  .progress-labels span.done{ color: var(--body-text); }

  /* ─── STAGE ──────────────────────────────────────────────────── */
  .stage{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem 3rem;
  }

  .act{
    max-width: 640px;
    width: 100%;
    opacity: 0;
    transform: translateY(14px);
    animation: actIn 0.55s cubic-bezier(.16,1,.3,1) forwards;
  }

  @keyframes actIn{
    to{ opacity: 1; transform: translateY(0); }
  }

  .act-eyebrow{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 0.6rem;
  }

  .act-title{
    font-family: var(--font-display);
    font-size: clamp(1.7rem, 4.2vw, 2.5rem);
    font-weight: 700;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .act-sub{
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* ─── DATA CARD ──────────────────────────────────────────────── */
  .data-card{
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }

  .data-card.alert{
    background: rgba(248,113,113,0.06);
    border-color: rgba(248,113,113,0.25);
  }

  .data-card.memory{
    background: rgba(124,58,237,0.06);
    border-color: rgba(124,58,237,0.22);
  }

  .data-card.harbor{
    background: rgba(6,182,212,0.06);
    border-color: rgba(6,182,212,0.22);
  }

  .data-card.summary{
    background: rgba(245,158,11,0.05);
    border-color: rgba(245,158,11,0.2);
  }

  .card-header{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .card-name{
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--starlight);
  }

  .card-name .sub{
    display: block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 400;
    margin-top: 0.25rem;
  }

  .status-pill{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.32rem 0.75rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-pill.green{ background: rgba(74,222,128,0.12); color: #4ADE80; border: 1px solid rgba(74,222,128,0.3); }
  .status-pill.red{ background: rgba(248,113,113,0.12); color: var(--risk-red); border: 1px solid rgba(248,113,113,0.3); }
  .status-pill.amber{ background: rgba(245,158,11,0.12); color: var(--seal-gold); border: 1px solid rgba(245,158,11,0.3); }
  .status-pill.violet{ background: rgba(124,58,237,0.15); color: #C4B5FD; border: 1px solid rgba(124,58,237,0.35); }
  .status-pill.cyan{ background: rgba(6,182,212,0.12); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }

  .field-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.1rem 1.5rem;
  }

  .field{ min-width: 0; }

  .field-label{
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .field-value{
    font-size: 0.98rem;
    color: var(--starlight);
    font-weight: 500;
    line-height: 1.4;
  }

  .field-value.big{
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
  }

  .field-value.risk{ color: var(--risk-red); }
  .field-value.accent{ color: var(--cyan); }

  .divider-line{
    grid-column: 1 / -1;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0.15rem 0;
  }

  .exec-list{ list-style: none; }
  .exec-list li{
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.55rem 0;
    font-size: 0.95rem;
    color: var(--body-text);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .exec-list li:last-child{ border-bottom: none; }
  .exec-list li::before{
    content: '✓';
    color: var(--seal-gold);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .powered-by{
    margin-top: 1rem;
    padding-top: 0.85rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  /* ─── DUAL AGENT VOICES ──────────────────────────────────────── */
  .voice{
    display: flex;
    gap: 0.85rem;
    align-items: flex-start;
    padding: 1rem 1.15rem;
    border-radius: 10px;
    margin-bottom: 0.85rem;
  }

  .voice.purple{
    background: rgba(124,58,237,0.07);
    border-left: 3px solid var(--violet);
  }

  .voice.ccb{
    background: rgba(6,182,212,0.06);
    border-left: 3px solid var(--cyan);
  }

  .voice-icon{
    font-size: 1.3rem;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .voice-body{ flex: 1; min-width: 0; }

  .voice-name{
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .voice.purple .voice-name{ color: #C4B5FD; }
  .voice.ccb .voice-name{ color: var(--cyan); }

  .voice-line{
    font-style: italic;
    font-size: 0.92rem;
    line-height: 1.55;
    color: var(--starlight);
  }

  /* ─── CONTROLS ───────────────────────────────────────────────── */
  .controls{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    gap: 1rem;
  }

  .btn-back{
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.6rem 0.25rem;
    transition: color 0.2s ease;
  }
  .btn-back:hover{ color: var(--body-text); }
  .btn-back:disabled{ visibility: hidden; }

  .btn-continue{
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--void);
    background: linear-gradient(135deg, var(--starlight), #fff);
    border: none;
    padding: 0.85rem 2.1rem;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 20px rgba(124,58,237,0.15);
  }

  .btn-continue:hover{
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124,58,237,0.28);
  }

  .btn-continue:active{ transform: translateY(0); }

  .btn-restart{
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--starlight);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.85rem 2.1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-restart:hover{ background: rgba(255,255,255,0.1); }

  /* ─── CERTIFICATE OF DISCHARGE ──────────────────────────────── */
  .cert-wrap{ margin-bottom: 1.75rem; }

  .cert{
    background: linear-gradient(160deg, #0F0B22 0%, #0D0B1E 100%);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(245,158,11,0.08) inset,
      0 24px 60px rgba(0,0,0,0.55);
    position: relative;
  }

  .cert::before, .cert::after{
    content: '';
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: rgba(245,158,11,0.28);
    border-style: solid;
  }
  .cert::before{ top: 12px; left: 12px; border-width: 1px 0 0 1px; border-radius: 3px 0 0 0; }
  .cert::after{  top: 12px; right: 12px; border-width: 1px 1px 0 0; border-radius: 0 3px 0 0; }

  .cert-bottom-corners{ position: absolute; inset: 0; pointer-events: none; }
  .cert-bottom-corners::before,
  .cert-bottom-corners::after{
    content: '';
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: rgba(245,158,11,0.28);
    border-style: solid;
  }
  .cert-bottom-corners::before{ bottom: 12px; left: 12px; border-width: 0 0 1px 1px; border-radius: 0 0 0 3px; }
  .cert-bottom-corners::after{  bottom: 12px; right: 12px; border-width: 0 1px 1px 0; border-radius: 0 0 3px 0; }

  .cert-header{
    background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(124,58,237,0.08));
    border-bottom: 1px solid rgba(245,158,11,0.18);
    padding: 1.5rem 1.75rem 1.25rem;
    text-align: center;
    position: relative;
  }

  .cert-issuer{
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--seal-gold);
    margin-bottom: 0.5rem;
    opacity: 0.85;
  }

  .cert-title{
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    margin-bottom: 0.3rem;
  }

  .cert-subtitle{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .cert-seal{
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid rgba(245,158,11,0.45);
    background: rgba(245,158,11,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }

  .cert-body{ padding: 1.5rem 1.75rem; }

  .cert-section{ margin-bottom: 1.25rem; }
  .cert-section:last-child{ margin-bottom: 0; }

  .cert-section-label{
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--seal-gold);
    opacity: 0.7;
    margin-bottom: 0.5rem;
  }

  .cert-field-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem 1.25rem;
  }

  .cert-field{ min-width: 0; }

  .cert-field-label{
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  .cert-field-value{
    font-size: 0.9rem;
    color: var(--starlight);
    font-weight: 500;
    word-break: break-all;
    line-height: 1.4;
  }

  .cert-field-value.mono{
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--body-text);
    letter-spacing: 0.02em;
  }

  .cert-field-value.gold{ color: var(--seal-gold); }
  .cert-field-value.green{ color: #4ADE80; }
  .cert-field-value.cyan{ color: var(--cyan); }
  .cert-field-value.violet{ color: #C4B5FD; }

  .cert-divider{
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.18), transparent);
    margin: 1.1rem 0;
  }

  .cert-chain{
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .cert-chain-node{
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 6px;
    padding: 0.45rem 0.85rem;
  }

  .cert-chain-node .node-name{
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--starlight);
  }

  .cert-chain-node .node-role{
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.1rem;
  }

  .cert-chain-arrow{
    color: var(--violet);
    font-size: 1rem;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .cert-hash{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--body-text);
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 0.65rem 0.85rem;
    word-break: break-all;
    letter-spacing: 0.02em;
    line-height: 1.55;
  }

  .cert-footer{
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(245,158,11,0.12);
    padding: 1rem 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .cert-footer-status{
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4ADE80;
  }

  .cert-footer-status .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ADE80;
    box-shadow: 0 0 6px #4ADE80;
  }

  .cert-verify-link{
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--cyan);
    letter-spacing: 0.06em;
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .cert-verify-link:hover{ opacity: 1; }

  /* ─── FOUR-PARTY ATTESTATION BLOCKS ──────────────────────────── */
  .attestation-upper{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .att-block{
    border-radius: 10px;
    padding: 1rem 1.1rem 1rem;
    position: relative;
  }

  .att-block.finance{
    background: rgba(245,158,11,0.05);
    border: 1px solid rgba(245,158,11,0.28);
  }

  .att-block.slim{
    background: rgba(124,58,237,0.06);
    border: 1px solid rgba(124,58,237,0.28);
  }

  .att-block.legal{
    background: rgba(6,182,212,0.05);
    border: 1px solid rgba(6,182,212,0.28);
  }

  /* Ledger spans full width — binding element */
  .att-block.ledger{
    background: rgba(74,222,128,0.04);
    border: 1px solid rgba(74,222,128,0.26);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.85rem 1.5rem;
    align-items: center;
    padding: 1rem 1.25rem;
  }

  .att-ledger-left{}
  .att-ledger-right{
    text-align: right;
    flex-shrink: 0;
  }

  .att-number{
    font-family: var(--font-mono);
    font-size: 0.57rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .att-block.finance .att-number{ color: var(--seal-gold); }
  .att-block.slim .att-number{ color: #C4B5FD; }
  .att-block.legal .att-number{ color: var(--cyan); }
  .att-block.ledger .att-number{ color: #4ADE80; }

  .att-role{
    font-family: var(--font-display);
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--starlight);
    margin-bottom: 0.35rem;
    line-height: 1.2;
  }

  .att-certifies{
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.75rem;
  }

  .att-block.ledger .att-certifies{
    margin-bottom: 0;
    font-size: 0.8rem;
  }

  .att-sig{
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--body-text);
    background: rgba(0,0,0,0.28);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    word-break: break-all;
    letter-spacing: 0.02em;
    line-height: 1.55;
  }

  .att-sig-label{
    display: block;
    font-size: 0.52rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  .att-block.finance .att-sig-label{ color: var(--seal-gold); opacity: 0.7; }
  .att-block.slim .att-sig-label{ color: #C4B5FD; opacity: 0.7; }
  .att-block.legal .att-sig-label{ color: var(--cyan); opacity: 0.7; }
  .att-block.ledger .att-sig-label{ color: #4ADE80; opacity: 0.7; }

  .att-pill{
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.22rem 0.6rem;
    border-radius: 20px;
    white-space: nowrap;
    margin-bottom: 0.5rem;
    display: inline-block;
  }

  .att-pill.amber{ background: rgba(245,158,11,0.12); color: var(--seal-gold); border: 1px solid rgba(245,158,11,0.3); }
  .att-pill.violet{ background: rgba(124,58,237,0.15); color: #C4B5FD; border: 1px solid rgba(124,58,237,0.35); }
  .att-pill.cyan{ background: rgba(6,182,212,0.12); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }
  .att-pill.green{ background: rgba(74,222,128,0.1); color: #4ADE80; border: 1px solid rgba(74,222,128,0.28); }

  .ledger-bind-label{
    font-family: var(--font-mono);
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(74,222,128,0.5);
    text-align: center;
    padding: 0.35rem 0;
    position: relative;
  }

  .ledger-bind-label::before,
  .ledger-bind-label::after{
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;

<body>

<div class="progress-wrap">
  <div class="progress-track" id="progressTrack"></div>
  <div class="progress-labels" id="progressLabels"></div>
</div>

<div class="stage" id="stage"></div>

<div class="footer-tag">Stewardship Lifecycle Infrastructure Management // Investment Banking — MNPI // Seven Moments // No live data connected</div>

<script>
(function(){

  const acts = [
    { key: 'obligation', label: 'Obligation'           },
    { key: 'boundary',   label: 'Trust Boundary'       },
    { key: 'memory',     label: 'Institutional Memory' },
    { key: 'harbor',     label: 'Safe Harbor'          },
    { key: 'library',    label: 'Library Card'         },
    { key: 'management', label: 'Management Boundary'  },
    { key: 'amendment',  label: 'Post-Closing'         }
  ];

  let current = 0;

  const track  = document.getElementById('progressTrack');
  const labels = document.getElementById('progressLabels');
  const stage  = document.getElementById('stage');

  acts.forEach((a) => {
    const seg = document.createElement('div');
    seg.className = 'progress-seg';
    seg.innerHTML = '<div class="fill"></div>';
    track.appendChild(seg);
    const lbl = document.createElement('span');
    lbl.textContent = a.label;
    labels.appendChild(lbl);
  });

  function renderProgress(){
    const segs = track.querySelectorAll('.progress-seg .fill');
    const lbls = labels.querySelectorAll('span');
    segs.forEach((f, i) => {
      if (current >= acts.length){ f.style.transform = 'scaleX(1)'; return; }
      f.style.transform = i < current ? 'scaleX(1)' : (i === current ? 'scaleX(0.5)' : 'scaleX(0)');
    });
    lbls.forEach((l, i) => {
      l.classList.remove('current','done');
      if (i < current || current >= acts.length) l.classList.add('done');
      else if (i === current) l.classList.add('current');
    });
  }

  function voiceHTML(agent, name, line){
    const icon = agent === 'purple' ? '🟣' : '🌟';
    return `<div class="voice ${agent}">
      <div class="voice-icon">${icon}</div>
      <div class="voice-body">
        <div class="voice-name">${name}</div>
        <div class="voice-line">"${line}"</div>
      </div>
    </div>`;
  }

  function controlsHTML(showBack){
    return `<div class="controls">
      <button class="btn-back" id="btnBack" ${showBack ? '' : 'disabled'}>← Back</button>
      <button class="btn-continue" id="btnNext">Continue</button>
    </div>`;
  }

  // ─── ACT I ───────────────────────────────────────────────────────
  function sceneObligation(){
    return `
      <div class="act">
        <div class="act-eyebrow">Act I — The Obligation</div>
        <h1 class="act-title">Something requires stewardship.</h1>
        <p class="act-sub">Every consequential decision begins the same way — someone accepts custody of material non-public information.</p>

        <div class="data-card">
          <div class="card-header">
            <div class="card-name">Deal Qualification — Project Atlas<span class="sub">UDT-DEAL-2026-IB-0391</span></div>
            <div class="status-pill green">● Active</div>
          </div>
          <div class="field-grid">
            <div class="field">
              <div class="field-label">Primary Transaction Steward</div>
              <div class="field-value">Sarah Chen, VP — M&amp;A Advisory</div>
            </div>
            <div class="field">
              <div class="field-label">Risk Classification</div>
              <div class="field-value risk">MNPI — Material Non-Public</div>
            </div>
            <div class="divider-line"></div>
            <div class="field">
              <div class="field-label">Domain</div>
              <div class="field-value">Investment Banking — M&amp;A Advisory</div>
            </div>
            <div class="field">
              <div class="field-label">Next Milestone</div>
              <div class="field-value">Fairness Opinion Review</div>
            </div>
          </div>
        </div>

        ${voiceHTML('purple','Purple Coach','Every obligation involving material non-public information requires a named, accountable transaction steward. Sarah has accepted custody. The record begins here — sealed, timestamped, and non-repudiable.')}

        ${controlsHTML(false)}
      </div>
    `;
  }

  // ─── ACT II ──────────────────────────────────────────────────────
  function sceneBoundary(){
    return `
      <div class="act">
        <div class="act-eyebrow">Act II — Trust Boundary Crossed</div>
        <h1 class="act-title">Something goes wrong.</h1>
        <p class="act-sub">The target company's auditor issues a material financial restatement. Every deal instrument built on those financials is compromised — automatically identified, and every document access token across all affected deals is recalled immediately.</p>

        <div class="data-card alert">
          <div class="card-header">
            <div class="card-name">Counterparty Disclosure<span class="sub">Financial Restatement Issued</span></div>
            <div class="status-pill red">Cascade Detected</div>
          </div>
          <div class="field-grid">
            <div class="field">
              <div class="field-label">Halted at Source</div>
              <div class="field-value big risk">1</div>
            </div>
            <div class="field">
              <div class="field-label">Flagged for Review</div>
              <div class="field-value big" style="color:var(--seal-gold)">7</div>
            </div>
            <div class="divider-line"></div>
            <div class="field">
              <div class="field-label">Pending Mandates at Risk</div>
              <div class="field-value">3 Active Mandates</div>
            </div>
            <div class="field">
              <div class="field-label">Detection</div>
              <div class="field-value accent">Automatic — no manual audit required</div>
            </div>
            <div class="divider-line"></div>
            <div class="field">
              <div class="field-label">Document Tokens Recalled</div>
              <div class="field-value accent">7 — Automatic</div>
            </div>
            <div class="field">
              <div class="field-label">Perimeter</div>
              <div class="field-value accent">Document access collapsed at cascade</div>
            </div>
          </div>
        </div>

        ${voiceHTML('purple','Purple Coach','A trust boundary has been crossed. Every deal instrument that depended on these financials has been identified — not by a compliance officer searching manually, but by the ledger itself. Document access tokens across all seven flagged obligations were revoked the instant the cascade fired.')}
        ${voiceHTML('ccb','Golden Steward','One halted clean at source. Seven downstream obligations flagged. Seven tokens recalled in the same second the cascade fired — automatic, no manual intervention. Nothing slips through quiet.')}

        ${controlsHTML(true)}
      </div>
    `;
  }

  // ─── ACT III ─────────────────────────────────────────────────────
  function sceneMemory(){
    return `
      <div class="act">
        <div class="act-eyebrow">Act III — Institutional Memory</div>
        <h1 class="act-title">Has this happened before?</h1>
        <p class="act-sub">Purple becomes valuable here — not because it predicts, but because it remembers every material disclosure event that already closed.</p>

        <div class="data-card memory">
          <div class="card-header">
            <div class="card-name">Institutional Memory<span class="sub">Material Disclosure Event — M&amp;A Advisory</span></div>
            <div class="status-pill violet">247 Cases</div>
          </div>
          <div class="field-grid">
            <div class="field">
              <div class="field-label">Similar Cases</div>
              <div class="field-value big">247</div>
            </div>
            <div class="field">
              <div class="field-label">Typical Resolution</div>
              <div class="field-value big">2 Days</div>
            </div>
            <div class="divider-line"></div>
            <div class="field">
              <div class="field-label">Historical Risk Rate</div>
              <div class="field-value accent">4.1%</div>
            </div>
            <div class="field">
              <div class="field-label">Recurring Pattern</div>
              <div class="field-value">Independent valuation before revised fairness opinion</div>
            </div>
          </div>
        </div>

        ${voiceHTML('purple','Purple Coach','Institutional Memory found 247 similar material disclosure events. Nothing here is a forecast — it is a record of what already happened, and what resolved cleanly.')}

        ${controlsHTML(true)}
      </div>
    `;
  }

  // ─── ACT IV ──────────────────────────────────────────────────────
  function sceneHarbor(){
    return `
      <div class="act">
        <div class="act-eyebrow">Act IV — Safe Harbor Transfer</div>
        <h1 class="act-title">The transaction steward must recuse.</h1>
        <p class="act-sub">Sarah discovers a potential conflict of interest mid-deal. The obligation cannot sit unowned. A qualified transaction steward accepts custody — after reviewing the full deal history.</p>

        <div class="data-card harbor">
          <div class="card-header">
            <div class="card-name">Primary Transaction Steward<span class="sub">Sarah Chen — Recusal Required</span></div>
            <div class="status-pill amber">Unavailable</div>
          </div>
          <div class="field-grid">
            <div class="field">
              <div class="field-label">Safe Harbor</div>
              <div class="field-value" style="color:var(--seal-gold)">Transfer Required</div>
            </div>
            <div class="field">
              <div class="field-label">Incoming Transaction Steward</div>
              <div class="field-value">James Wilson, Associate Director</div>
            </div>
            <div class="divider-line"></div>
            <div class="field">
              <div class="field-label">Authority Check</div>
              <div class="field-value accent">Verified — Departmental Clearance</div>
            </div>
            <div class="field">
              <div class="field-label">Pre-Deal Briefing</div>
              <div class="field-value">Full deal history reviewed before custody accepted</div>
            </div>
          </div>
        </div>

        ${voiceHTML('ccb','Golden Steward','No Transaction Steward is left holding MNPI without a documented custodian. One click, and custody transfers seamlessly.')}
        ${voiceHTML('purple','Purple Coach','James has reviewed the full history of this obligation before accepting it. The chain of custody is unbroken. The deal can continue.')}

        ${controlsHTML(true)}
      </div>
    `;
  }

  // ─── ACT V ───────────────────────────────────────────────────────
  function sceneLibraryCard(){
    return `
      <div class="act">
        <div class="act-eyebrow">Act V — Library Card + Watermark + Document Perimeter</div>
